name: CI

on:
  push:
    branches: [main, v5-development]
  pull_request:
    branches: [main, v5-development]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify package imports
        run: |
          python -c "from src import SentinelRAG, QueryResult, create_system"
          python -c "from src.sentinel import SentinelDetector, SentinelNeutralizer, SentinelPipeline, ProcessedChunk"
          python -c "from src.rag import RAGPipeline, OllamaLLM"
          python -c "from src.web.new_app import app"

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing
