name: Lint

on:
  push:
    branches: [main, v5-development]
  pull_request:
    branches: [main, v5-development]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.22 black==26.5.1 isort==8.0.1

      - name: ruff
        run: ruff check .

      - name: black
        run: black --check .

      - name: isort
        run: isort --check-only .
