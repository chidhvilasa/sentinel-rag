name: Security

on:
  push:
    branches: [main, v5-development]
  pull_request:
    branches: [main, v5-development]
  schedule:
    # Weekly, so newly-disclosed CVEs in pinned dependencies surface even
    # without a code change.
    - cron: "0 6 * * 1"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit==2.10.1

      - name: pip-audit (runtime dependencies)
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln PYSEC-2026-311
          # PYSEC-2026-311: pre-auth RCE in ChromaDB's HTTP server API
          # (/api/v2/.../collections with trust_remote_code=True). This
          # project only uses Chroma() in embedded/local-persistence mode
          # via LangChain and never runs a ChromaDB server process, so the
          # vulnerable code path is never reached. No fixed release exists
          # yet upstream. Revisit when one ships.

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bandit
        run: python -m pip install --upgrade pip bandit==1.9.4

      - name: bandit
        run: |
          bandit -r src scripts examples run_sentinel_v5.py \
            --skip B311,B404,B603,B615
          # B311 (random module): used only for generating adversarial test
          #   strings and picking dataset templates, never for a security
          #   decision — not the "insecure randomness" bandit warns about.
          # B404/B603 (subprocess): every call uses a hardcoded argument
          #   list (`pip install <pkg>`), never shell=True or user input.
          # B615 (unpinned HuggingFace model/dataset revisions): a real
          #   supply-chain hardening suggestion, deliberately deferred —
          #   models are loaded from trusted, named publishers (protectai,
          #   microsoft, sentence-transformers, deepset), not arbitrary
          #   user-supplied repos. Revisit if that ever changes.
          # Anything NOT in this skip list still fails the build.

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
